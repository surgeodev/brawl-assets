name: Monthly Brawl Assets Update
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libdbus-1-3 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: Install Python deps
        run: pip install Pillow playwright

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Scrape Fankit (Playwright bypasses AWS WAF)
        run: python scripts/scrape_fankit.py
        timeout-minutes: 30
        continue-on-error: true

      - name: Build indexes from metadata + BrawlAPI + CDN
        run: python scripts/rebuild_indexes.py
        timeout-minutes: 10

      - name: Generate previews (requires originals)
        run: python scripts/build_previews.py 2>/dev/null || echo "No originals, skipping"
        continue-on-error: true

      - name: Build master prompt
        run: |
          cat knowledge/*.md > data/master_prompt.md 2>/dev/null || true
          echo "Master prompt: $(wc -c < data/master_prompt.md) bytes"

      - name: Create download zip
        run: |
          mkdir -p download
          cd data && zip -r ../download/brawl_stars_vision_pack.zip \
            assets.json brawlers.json search_index.json preview_manifest.json \
            brawler_profiles/ ../master_prompt.md 2>/dev/null; cd ..
          if [ -d previews ] && [ "$(ls -A previews 2>/dev/null)" ]; then
            zip -r download/brawl_stars_vision_pack.zip previews/ \
              -x "*/BrawlAssets/*" -x "*/_raw_assets/*" -x "*/_cdn_brawlers/*"
          fi
          echo "Zip size: $(du -sh download/brawl_stars_vision_pack.zip | cut -f1)"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          exclusion: '**/BrawlAssets/** **/_raw_assets/** **/_cdn_brawlers/** **/.git/** **/.github/** **/node_modules/**'

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit updated data
        run: |
          git config user.name "brawl-bot"
          git config user.email "bot@brawl-assets"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add data/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: monthly asset update ($(date +%Y-%m-%d))"
            git push
          fi
