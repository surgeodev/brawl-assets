name: Monthly Brawl Assets Update
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libglib2.0-0 libnss3 libnspr4 \
            libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 curl

      - name: Install Python deps
        run: pip install Pillow

      - name: Download Fankit assets from mirror (fallback)
        run: |
          mkdir -p _raw_assets
          if [ -d _raw_assets ] && [ "$(ls -A _raw_assets 2>/dev/null)" ]; then
            echo "Assets already present, skipping download"
          else
            echo "Downloading Fankit assets from mirror..."
            curl -sL "https://github.com/LaptopCat/bs-fankit-rehosted/archive/refs/heads/main.tar.gz" \
              -o /tmp/fankit.tar.gz
            tar xzf /tmp/fankit.tar.gz -C /tmp
            if [ -d "/tmp/bs-fankit-rehosted-main/assets" ]; then
              cp -r /tmp/bs-fankit-rehosted-main/assets/* _raw_assets/ 2>/dev/null || true
            fi
            echo "Assets after mirror download: $(find _raw_assets -type f | wc -l)"
            rm -f /tmp/fankit.tar.gz
            rm -rf /tmp/bs-fankit-rehosted-main
          fi
        continue-on-error: true

      - name: Try Playwright scrape (best effort)
        run: |
          pip install playwright
          playwright install chromium
          python scripts/scrape_fankit.py || echo "Scrape failed (non-fatal)"
        continue-on-error: true
        timeout-minutes: 30

      - name: Rebuild indexes + download CDN portraits
        run: python scripts/rebuild_indexes.py
        timeout-minutes: 30

      - name: Generate WebP previews
        run: |
          mkdir -p previews
          python scripts/build_previews.py
        timeout-minutes: 60
        continue-on-error: true

      - name: Generate brawler profiles
        run: python scripts/rebuild_indexes.py --profiles-only
        continue-on-error: true

      - name: Build master prompt
        run: |
          cat knowledge/*.md > data/master_prompt.md 2>/dev/null || true
          echo "Master prompt: $(wc -c < data/master_prompt.md) bytes"

      - name: Create download zip
        run: |
          mkdir -p download
          cd data && zip -r ../download/brawl_stars_vision_pack.zip \
            assets.json brawlers.json search_index.json preview_manifest.json \
            brawler_profiles/ ../master_prompt.md 2>/dev/null; cd ..
          if [ -d previews ] && [ "$(ls -A previews 2>/dev/null)" ]; then
            zip -r download/brawl_stars_vision_pack.zip previews/ \
              -x "*/BrawlAssets/*" -x "*/_raw_assets/*" -x "*/_cdn_brawlers/*"
          fi
          echo "Zip size: $(du -sh download/brawl_stars_vision_pack.zip | cut -f1)"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          exclusion: '**/BrawlAssets/** **/_raw_assets/** **/_cdn_brawlers/** **/.git/** **/.github/** **/node_modules/**'

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit updated data
        run: |
          git config user.name "brawl-bot"
          git config user.email "bot@brawl-assets"
          git add data/ preview_manifest.json previews/ 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "auto: monthly asset update ($(date +%Y-%m-%d))"
          git push
