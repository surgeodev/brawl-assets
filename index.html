<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brawl Assets Hub</title>
<style>
  :root { --bg: #0f0f1a; --card: #1a1a2e; --accent: #e94560; --text: #e0e0e0; --muted: #667788; --border: #2a2a3e; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: linear-gradient(135deg, #16213e 0%, #0f3460 100%); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 50; }
  header h1 { font-size: 18px; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .subtitle { font-size: 11px; color: var(--muted); }
  .header-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .header-actions input, .header-actions select { padding: 5px 10px; border: 1px solid var(--border); border-radius: 5px; background: #0d1b2a; color: var(--text); font-size: 12px; }
  .header-actions input:focus { outline: 2px solid var(--accent); }
  .header-actions input::placeholder { color: #445; }

  .tabs { display: flex; gap: 0; background: #111122; border-bottom: 1px solid var(--border); padding: 0 20px; overflow-x: auto; }
  .tab { padding: 10px 16px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); white-space: nowrap; transition: 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .count { margin-left: 4px; font-size: 10px; opacity: 0.6; }

  .stats { display: flex; gap: 16px; font-size: 11px; color: var(--muted); padding: 6px 20px; background: #0d0d1a; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .stats strong { color: var(--text); }

  .container { padding: 16px 20px; max-width: 1400px; margin: 0 auto; }
  .brawler-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }

  .brawler-card { position: relative; background: var(--card); border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 2px solid transparent; }
  .brawler-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(233,69,96,0.12); }
  .brawler-card.selected { border-color: var(--accent); }
  .brawler-card .thumb-wrap { width: 100%; aspect-ratio: 1; background: #0d1b2a; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .brawler-card .thumb-wrap img { width: 82%; height: 82%; object-fit: contain; transition: transform 0.3s; }
  .brawler-card:hover .thumb-wrap img { transform: scale(1.05); }
  .brawler-card .info { padding: 6px 8px; }
  .brawler-card .info .name { font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .brawler-card .info .meta { font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; }
  .brawler-card .rarity-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }

  .rarity-Common .rarity-bar { background: #b0b0b0; }
  .rarity-Rare .rarity-bar { background: #59b9ff; }
  .rarity-Super-Rare .rarity-bar { background: #00e5ff; }
  .rarity-Epic .rarity-bar { background: #d850ff; }
  .rarity-Mythic .rarity-bar { background: #fe5e72; }
  .rarity-Legendary .rarity-bar { background: #ffd700; }
  .rarity-Ultra-Legendary .rarity-bar { background: #ff4444; }

  .cat-asset { position: relative; aspect-ratio: 1; background: #0d1b2a; border-radius: 5px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); }
  .cat-asset img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .cat-asset .label { position: absolute; bottom: 0; left: 0; right: 0; font-size: 8px; background: #000a; padding: 2px 4px; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cat-asset:hover { border-color: var(--accent); }

  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: 10px; max-width: 900px; width: 95%; max-height: 88vh; overflow-y: auto; padding: 20px; position: relative; }
  .modal .close { position: absolute; top: 10px; right: 14px; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; z-index: 1; }
  .modal h2 { font-size: 20px; margin-bottom: 4px; }
  .modal-meta { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
  .modal .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 5px; }
  .modal .asset-grid .asset-item { position: relative; aspect-ratio: 1; background: #0d1b2a; border-radius: 4px; overflow: hidden; cursor: pointer; border: 2px solid transparent; }
  .modal .asset-grid .asset-item:hover { border-color: var(--accent); }
  .modal .asset-grid .asset-item img { width: 100%; height: 100%; object-fit: contain; }
  .modal .asset-grid .asset-item .cat-label { position: absolute; bottom: 1px; left: 1px; font-size: 7px; background: #0008; padding: 1px 3px; border-radius: 2px; color: #999; }
  .cat-header { grid-column: 1 / -1; font-size: 11px; color: var(--muted); padding: 6px 0 3px; border-bottom: 1px solid var(--border); margin-top: 3px; font-weight: 600; }
  .copy-btn { position: absolute; top: 2px; right: 2px; background: var(--accent); color: #fff; border: none; border-radius: 3px; padding: 1px 5px; font-size: 8px; cursor: pointer; opacity: 0; transition: opacity 0.15s; z-index: 1; }
  .asset-item:hover .copy-btn { opacity: 1; }

  .board { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(13,27,42,0.95); backdrop-filter: blur(8px); border-top: 2px solid var(--accent); transform: translateY(calc(100% - 36px)); transition: transform 0.3s; z-index: 100; }
  .board.open { transform: translateY(0); }
  .board-toggle { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; border: none; padding: 5px 16px; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 11px; white-space: nowrap; }
  .board-inner { padding: 8px 16px 10px; display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap; }
  .board-items { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; min-height: 50px; }
  .board-item { width: 48px; text-align: center; position: relative; }
  .board-item img { width: 48px; height: 48px; object-fit: contain; background: #0003; border-radius: 3px; }
  .board-item .name { font-size: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
  .board-item .remove { position: absolute; top: -4px; right: -4px; background: var(--accent); color: #fff; border: none; border-radius: 50%; width: 14px; height: 14px; font-size: 8px; cursor: pointer; line-height: 14px; text-align: center; }
  .board-actions { display: flex; gap: 4px; flex-wrap: wrap; }
  .board-actions button { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--border); color: var(--text); }

  .prompt-box { font-family: monospace; font-size: 10px; white-space: pre-wrap; background: #0d1b2a; border-radius: 5px; padding: 10px; max-height: 120px; overflow-y: auto; margin-top: 6px; color: #9ab; display: none; line-height: 1.4; }

  .copied-msg { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 6px 14px; border-radius: 5px; font-size: 12px; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; }

  .yt-section { max-width: 1400px; margin: 0 auto; padding: 0 20px 12px; }
  .yt-form { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; background: var(--card); padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border); }
  .yt-form input[type=text] { flex: 1; min-width: 160px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; background: #0d1b2a; color: var(--text); font-size: 12px; }
  .yt-form .status { font-size: 11px; color: var(--muted); }
  .yt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 8px; }
  .yt-card { background: var(--card); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
  .yt-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .yt-card .info { padding: 6px 8px; }
  .yt-card .info .title { font-size: 11px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .yt-card .info .meta { font-size: 9px; color: var(--muted); }

  @media (max-width: 600px) {
    .brawler-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }
    .cat-grid { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); }
    .header-actions input { width: 100%; }
    .tabs { padding: 0 10px; }
    .tab { padding: 8px 10px; font-size: 11px; }
    .modal .asset-grid { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1><span>Brawl</span> Assets Hub</h1>
    <div class="subtitle"><span id="totalBrawlers">0</span> brawlers · <span id="totalAssets">0</span> assets</div>
  </div>
  <div class="header-actions">
    <input type="text" id="search" placeholder="Search..." oninput="renderTab()" style="width:140px;">
    <select id="rarityFilter" onchange="renderTab()" style="display:none;">
      <option value="">All</option>
      <option>Common</option>
      <option>Rare</option>
      <option>Super Rare</option>
      <option>Epic</option>
      <option>Mythic</option>
      <option>Legendary</option>
      <option>Ultra Legendary</option>
    </select>
    <button class="btn-secondary" onclick="triggerScrape()" id="scrapeBtn" style="padding:5px 10px;font-size:11px;">🔄 Scrape</button>
    <button class="btn-secondary" onclick="pullUpdates()" id="pullBtn" style="padding:5px 10px;font-size:11px;">⬇️ Pull</button>
  </div>
</header>

<div class="tabs" id="tabs"></div>

<div class="yt-section" id="yt-section">
  <div class="yt-form">
    <span style="font-size:12px;font-weight:600;">🎬 YouTube</span>
    <input type="text" id="ytInput" placeholder="Paste URL or video ID..." onkeydown="if(event.key==='Enter')addYtExample()">
    <button class="btn-primary" onclick="addYtExample()" style="padding:6px 12px;font-size:11px;">Add</button>
    <span class="status" id="ytStatus"></span>
  </div>
  <div class="yt-grid" id="ytGrid"></div>
</div>

<div class="stats">
  <span id="activeStat">Browse assets</span>
</div>

<div class="container">
  <div class="brawler-grid" id="grid"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">—</h2>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="asset-grid" id="modalAssets"></div>
  </div>
</div>

<div class="board" id="board">
  <button class="board-toggle" onclick="toggleBoard()">📋 Board (<span id="boardCount">0</span>)</button>
  <div class="board-inner">
    <div class="board-items" id="boardItems"><div style="color:var(--muted);font-size:10px;padding:6px;">Click assets to add</div></div>
    <div class="board-actions">
      <button class="btn-primary" onclick="genPrompt()">🎯 Prompt</button>
      <button class="btn-secondary" onclick="clearBoard()">Clear</button>
    </div>
  </div>
  <div class="prompt-box" id="promptOut"></div>
</div>
<div class="copied-msg" id="copiedMsg"></div>

<script>
let brawlers = [], allAssets = [], manifest = [], manifestPaths = new Set(), ytExamples = [], board = [];
let activeTab = 'brawlers';

const CAT_ORDER = ['Brawlers','Portraits','Pins','Emojis','Sprays','Backgrounds','LoadingScreens','Animations','UI','Icons','Misc','Logos'];
const CAT_LABELS = {Brawlers:'Brawlers',Portraits:'Portraits',Pins:'Pins',Emojis:'Emojis',Sprays:'Sprays',Backgrounds:'Backgrounds',LoadingScreens:'Loading',Animations:'Animations',UI:'UI',Icons:'Icons',Misc:'Misc',Logos:'Logos'};

async function load() {
  try {
    const [bRes, aRes, mRes] = await Promise.all([
      fetch('data/brawlers.json'),
      fetch('data/search_index.json'),
      fetch('data/preview_manifest.json')
    ]);
    brawlers = Object.entries(await bRes.json()).map(([k,v])=>({key:k,...v}));
    allAssets = await aRes.json();
    manifest = await mRes.json();
    manifestPaths = new Set(manifest.map(m => m.preview_path));
    document.getElementById('totalBrawlers').textContent = brawlers.length;
    document.getElementById('totalAssets').textContent = allAssets.length;
    renderTabs();
    switchTab('brawlers');
  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="empty">⚠️ Failed to load data<br>${e.message}</div>`;
  }
}

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '<div class="tab active" data-tab="brawlers" onclick="switchTab(\'brawlers\')">Brawlers <span class="count">'+brawlers.length+'</span></div>';
  const counts = {};
  for (const a of allAssets) { const c = a.category || 'Other'; counts[c] = (counts[c]||0)+1; }
  for (const cat of CAT_ORDER) {
    if (counts[cat]) el.innerHTML += `<div class="tab" data-tab="${cat}" onclick="switchTab('${cat}')">${CAT_LABELS[cat]||cat} <span class="count">${counts[cat]}</span></div>`;
  }
  loadYtExamples();
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  const isBrawlers = tab === 'brawlers';
  document.getElementById('rarityFilter').style.display = isBrawlers ? 'inline-block' : 'none';
  document.getElementById('search').placeholder = isBrawlers ? 'Search brawler...' : 'Search assets...';
  document.getElementById('yt-section').style.display = isBrawlers ? 'block' : 'none';
  renderTab();
}

function renderTab() {
  const q = document.getElementById('search').value.toLowerCase();
  if (activeTab === 'brawlers') renderBrawlers(q);
  else renderCategory(activeTab, q);
}

function getBrawlerPreview(name, brawlerKey) {
  const b = brawlers.find(x => x.key === brawlerKey);
  if (!b) return null;
  const dir = b.preview_dir || b.key;
  const nameSafe = name.replace(/[^a-zA-Z0-9]/g,'_');
  const patterns = [
    `previews/Brawlers/${dir}/${nameSafe}_Default_001.webp`,
    `previews/Brawlers/${dir}/${nameSafe}_default_001.webp`,
    `previews/Brawlers/${dir}/${nameSafe}_bordered.webp`,
    `previews/Brawlers/${dir}/${nameSafe}_borderless.webp`,
    `previews/Brawlers/${dir}/${nameSafe}_Classic_001.webp`,
    `previews/Brawlers/${dir}/${nameSafe}_classic_001.webp`,
  ];
  for (const p of patterns) {
    if (manifestPaths.has(p)) return p;
  }
  if (manifest.length) {
    const first = manifest.find(m => m.preview_path.startsWith(`previews/Brawlers/${dir}/`));
    if (first) return first.preview_path;
  }
  return patterns[0];
}

function findAssetPreview(a) {
  const stem = (a.display_name||a.id).replace(/ /g,'_');
  const guess = `previews/${a.category}/${a.subcategory||'General'}/${stem}.webp`;
  if (manifestPaths.has(guess)) return guess;
  const lower = `previews/${(a.category||'').toLowerCase()}/${(a.subcategory||'').toLowerCase()}/${stem.toLowerCase()}.webp`;
  if (manifestPaths.has(lower)) return lower;
  for (const m of manifest) {
    if (m.id === a.id) return m.preview_path;
    if (m.display_name === a.display_name) return m.preview_path;
  }
  return guess;
}

function renderBrawlers(q) {
  const r = document.getElementById('rarityFilter').value;
  let filtered = brawlers.filter(b => (!r||b.rarity===r) && (!q||b.name.toLowerCase().includes(q)||b.key.toLowerCase().includes(q)));
  document.getElementById('activeStat').textContent = `Showing ${filtered.length} of ${brawlers.length} brawlers`;
  const grid = document.getElementById('grid');
  if (!filtered.length) { grid.innerHTML = '<div class="empty">No brawlers match</div>'; return; }
  grid.style.gridTemplateColumns = '';
  grid.className = 'brawler-grid';
  grid.innerHTML = filtered.map(b => {
    const p = getBrawlerPreview(b.name, b.key);
    const sel = board.some(i => i.brawlerKey === b.key);
    const thumbHtml = p ? `<img src="${p}" alt="${b.name}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<div style=\\'color:#445;font-size:20px;\\'>?</div>'">` : '<div style="color:#445;font-size:20px;">?</div>';
    return `<div class="brawler-card rarity-${b.rarity.replace(/ /g,'-')} ${sel?'selected':''}" onclick="openBrawler('${b.key}')">
      <div class="rarity-bar"></div>
      <div class="thumb-wrap">${thumbHtml}</div>
      <div class="info"><div class="name">${b.name}</div><div class="meta"><span>${b['class']}</span><span>${b.total_assets}</span></div></div>
    </div>`;
  }).join('');
}

function renderCategory(cat, q) {
  const items = allAssets.filter(a => (a.category||'Other') === cat && (!q || (a.display_name||'').toLowerCase().includes(q)));
  document.getElementById('activeStat').textContent = `${cat}: ${items.length} assets`;
  const grid = document.getElementById('grid');
  if (!items.length) { grid.innerHTML = '<div class="empty">No assets in this category</div>'; return; }
  grid.style.gridTemplateColumns = '';
  grid.className = 'cat-grid';
  grid.innerHTML = items.sort((a,b)=>(a.display_name||'').localeCompare(b.display_name||'')).map(a => {
    const pv = findAssetPreview(a);
    return `<div class="cat-asset" title="${a.display_name} (${a.subcategory})">
      <img src="${pv}" alt="${a.display_name}" loading="lazy" onclick="addToBoard('${a.brawler||a.category}','${(a.display_name||'').replace(/'/g,"")}','${pv}')" onerror="this.parentElement.style.display='none'">
      <div class="label">${a.display_name||'?'}</div>
    </div>`;
  }).join('');
}

// ── Brawler Modal ──
function openBrawler(key) {
  const b = brawlers.find(x => x.key === key);
  if (!b) return;
  document.getElementById('modalTitle').textContent = b.name;
  const ids = new Set();
  for (const cat of Object.values(b.asset_types||{})) cat.forEach(id => ids.add(id));
  const grouped = {};
  for (const a of allAssets) { if (ids.has(a.id)) { const c = a.category||'Other'; if (!grouped[c]) grouped[c]=[]; grouped[c].push(a); } }
  document.getElementById('modalMeta').innerHTML = `<span style="color:${b.color}">■</span> ${b.rarity} · ${b['class']} · ${b.total_assets} assets${b.skins?.length ? ' · Skins: '+b.skins.slice(0,6).join(', ')+(b.skins.length>6?'…':''):''}
    <button class="btn-secondary" onclick="copyBrawlerContext(brawlers.find(x=>x.key==='${b.key}'))" style="margin-left:6px;padding:2px 6px;font-size:10px;">📋 Copy</button>`;
  let html = '';
  for (const cat of CAT_ORDER) {
    const items = grouped[cat]; if (!items?.length) continue;
    html += `<div class="cat-header">${cat} (${items.length})</div>`;
    items.sort((a,b)=>(a.display_name||'').localeCompare(b.display_name||''));
    for (const a of items.slice(0,30)) {
      const pv = findAssetPreview(a);
      const dn = (a.display_name||'').replace(/'/g,"");
      html += `<div class="asset-item" title="${a.display_name}"><img src="${pv}" alt="${a.display_name}" loading="lazy" onclick="event.stopPropagation();addToBoard('${b.key}','${dn}','${pv}')" onerror="this.parentElement.style.display='none'"><button class="copy-btn" onclick="event.stopPropagation();copyUrl('${pv}')">📋</button><div class="cat-label">${a.subcategory||''}</div></div>`;
    }
    if (items.length > 30) html += `<div style="grid-column:1/-1;font-size:10px;color:var(--muted);padding:2px 0;">+${items.length-30} more</div>`;
  }
  document.getElementById('modalAssets').innerHTML = html || '<p style="color:var(--muted);padding:10px 0;">No previews</p>';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', function(e) { if (e.target===this) closeModal(); });

// ── Board ──
function addToBoard(bk, n, p) { if (board.length<8 && !board.some(i=>i.path===p)) { board.push({brawlerKey:bk,name:n,path:p}); updateBoard(); } }
function removeBoard(i) { board.splice(i,1); updateBoard(); }
function clearBoard() { board=[]; updateBoard(); document.getElementById('promptOut').style.display='none'; }
function toggleBoard() { document.getElementById('board').classList.toggle('open'); }
function updateBoard() {
  document.getElementById('boardCount').textContent = board.length;
  const el = document.getElementById('boardItems');
  if (!board.length) { el.innerHTML = '<div style="color:var(--muted);font-size:10px;padding:6px;">Click assets to add</div>'; return; }
  el.innerHTML = board.map((item,i) => `<div class="board-item"><img src="${item.path}" alt="${item.name}" onerror="this.remove()"><div class="name">${item.name}</div><button class="remove" onclick="removeBoard(${i})">✕</button></div>`).join('');
}
function genPrompt() {
  if (!board.length) return;
  const lines = ['┌─ COMPOSITION ─────────────────────────────────────────┐'];
  board.forEach((item,i) => { lines.push(`│ ${i+1}. ${(item.name||'').padEnd(46)}│`); lines.push(`│    ${(item.path||'').padEnd(46)}│`); });
  lines.push('├─ RULES ──────────────────────────────────────────────┤');
  lines.push('│ Selector: choose best assets for each layer         │');
  lines.push('│ Composer: subject 60%, bg 30%, accent 10%          │');
  lines.push('│ Palette: extract + harmonize 3 colors max           │');
  lines.push('│ Typography: Brawl Stars Heavy, stroke 2px black     │');
  lines.push('│ Anti-AI: no glow, no sparkles, no generic effects   │');
  lines.push('└──────────────────────────────────────────────────────┘');
  const out = document.getElementById('promptOut');
  out.textContent = lines.join('\n'); out.style.display = 'block';
}

// ── Copy ──
let copiedTimer;
function showCopied(m) { const e=document.getElementById('copiedMsg'); e.textContent=m; e.style.opacity='1'; clearTimeout(copiedTimer); copiedTimer=setTimeout(()=>e.style.opacity='0',2000); }
function copyUrl(path) { const u=window.location.origin+'/'+path; navigator.clipboard.writeText(u).then(()=>showCopied('📋 URL copied')).catch(()=>{const ta=document.createElement('textarea');ta.value=u;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();showCopied('📋 URL copied');}); }
function copyBrawlerContext(b) { if(!b)return; const p=getBrawlerPreview(b.name,b.key); const previewUrl=p?window.location.origin+'/'+p:''; let ctx=`Brawler: ${b.name}\nRarity: ${b.rarity} | Class: ${b['class']}\nAssets: ${b.total_assets}`; if(b.skins?.length) ctx+=`\nSkins: ${b.skins.slice(0,5).join(', ')}`; if(previewUrl) ctx+=`\nPreview: ${previewUrl}`; ctx+=`\nProfile: ${window.location.origin}/data/brawler_profiles/${b.key}.md`; navigator.clipboard.writeText(ctx).then(()=>showCopied('📋 Brawler context copied')); }

// ── GitHub Actions ──
async function triggerScrape() {
  const btn = document.getElementById('scrapeBtn'); btn.textContent='⏳...'; btn.disabled=true;
  try {
    const r = await fetch('/api/trigger-scrape', {method:'POST'}); const d = await r.json();
    if (d.ok) { btn.textContent='✅ Scraping'; showCopied('✅ Scrape triggered!'); }
    else { btn.textContent='❌ Failed'; showCopied('❌ '+d.error); }
  } catch(e) { btn.textContent='❌ Err'; showCopied('❌ '+e.message); }
  setTimeout(()=>{btn.textContent='🔄 Scrape'; btn.disabled=false;},5000);
}
async function pullUpdates() {
  const btn = document.getElementById('pullBtn'); btn.textContent='⏳ Pulling...'; btn.disabled=true;
  try {
    const r = await fetch('/api/pull', {method:'POST'}); const d = await r.json();
    if (d.ok) { btn.textContent='✅ Done'; showCopied('✅ Data updated! Reloading...'); setTimeout(()=>location.reload(),1500); }
    else { btn.textContent='❌ Failed'; showCopied('❌ '+d.error); }
  } catch(e) { btn.textContent='❌ Err'; showCopied('❌ '+e.message); }
  setTimeout(()=>{btn.textContent='⬇️ Pull'; btn.disabled=false;},5000);
}

// ── YouTube ──
async function loadYtExamples() {
  try { ytExamples = await (await fetch('data/examples_index.json')).json(); } catch(e) { ytExamples = []; }
  const grid = document.getElementById('ytGrid');
  if (!ytExamples.length) { grid.innerHTML = '<div style="color:var(--muted);font-size:11px;grid-column:1/-1;padding:4px 0;">No examples yet</div>'; return; }
  grid.innerHTML = ytExamples.slice().reverse().map(ex => `<div class="yt-card"><img src="examples/${ex.file}" alt="${ex.title}" loading="lazy" onerror="this.style.display=\'none\'"><div class="info"><div class="title" title="${ex.title}">${ex.title}</div><div class="meta">${ex.quality} · ${(ex.size/1024).toFixed(0)}KB</div></div></div>`).join('');
}
async function addYtExample() {
  const input = document.getElementById('ytInput'), status = document.getElementById('ytStatus'), url = input.value.trim();
  if (!url) return; status.textContent = '⏳...';
  try {
    const r = await fetch('/api/add-example', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url})});
    const d = await r.json();
    if (d.ok) { status.textContent='✅ Added!'; input.value=''; await loadYtExamples(); setTimeout(()=>status.textContent='',3000); }
    else { status.textContent='❌ '+d.error; }
  } catch(e) { status.textContent='❌ '+e.message; }
}

load();
